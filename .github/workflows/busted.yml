name: Busted

on: [push, pull_request]

jobs:
  busted:
    strategy:
      fail-fast: false
      matrix:
        luaVersion: ["5.5.0", "5.4", "5.3", "5.2", "5.1", "luajit-2.1"]
        os: [ubuntu-latest, windows-latest]
        exclude:
          # luaposix has no Lua 5.5 support yet; exec.run requires it on Linux
          - os: ubuntu-latest
            luaVersion: "5.5.0"
          # LuaRocks can't find LuaJIT .lib for C rock compilation on Windows
          - os: windows-latest
            luaVersion: "luajit-2.1"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: Setup LuaRocks
        uses: luarocks/gh-actions-luarocks@v6
        with:
          luaRocksVersion: "3.13.0"

      - name: Setup dependencies
        run: |
          luarocks install busted
          luarocks install penlight
          luarocks install luamark
          luarocks install argparse --dev
          luarocks install dkjson
          luarocks install chronos
          luarocks install https://raw.githubusercontent.com/lunarmodules/terminal.lua/refs/heads/main/terminal-scm-1.rockspec

      # luaposix depends on luabitop which has no Lua 5.5 support yet
      - name: Setup POSIX dependencies
        if: runner.os != 'Windows' && !startsWith(matrix.luaVersion, '5.5')
        run: luarocks install luaposix

      - name: Run tests
        run: busted

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: "5.4"

      - name: Setup LuaRocks
        uses: luarocks/gh-actions-luarocks@v6
        with:
          luaRocksVersion: "3.13.0"

      - name: Setup dependencies
        run: |
          luarocks install busted
          luarocks install luacov
          luarocks install penlight
          luarocks install luamark
          luarocks install argparse
          luarocks install dkjson
          luarocks install chronos
          luarocks install luaposix
          luarocks install https://raw.githubusercontent.com/lunarmodules/terminal.lua/refs/heads/main/terminal-scm-1.rockspec

      - name: Run tests with coverage
        run: busted -c

      - name: Print coverage summary
        run: luacov && tail -7 luacov.report.out
